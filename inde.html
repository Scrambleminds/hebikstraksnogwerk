<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Baan Check</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🤖 Wordt jouw baan overgenomen door AI?</h1>
        
        <div class="search-section">
            <input type="text" id="beroep" placeholder="Vul je beroep in (bijv. programmeur, leraar, bakker...)">
            <button onclick="checkBeroep()">Check!</button>
        </div>

        <div class="result-section" id="resultSection" style="display: none;">
            <div class="rapport" id="rapport"></div>
            
            <div class="meter-container">
                <h3>Risicometer:</h3>
                <div class="meter">
                    <div class="meter-vulling" id="meterVulling"></div>
                </div>
                <div class="score" id="scoreText"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
